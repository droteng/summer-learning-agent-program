<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Printable Learning Report</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="report-page">
    <main class="report-shell">
      <div class="report-actions">
        <a href="/">Back to dashboard</a>
        <button id="printReportButton" type="button">Print</button>
        <button id="downloadReportButton" type="button" class="secondary">Download text</button>
      </div>

      <section id="reportContent" class="print-report">
        <p class="eyebrow">Teacher Share Report</p>
        <h1>Loading report</h1>
      </section>
    </main>

    <script src="./report.js"></script>
  </body>
</html>
