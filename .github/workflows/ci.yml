name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          LLM_TELEMETRY_SILENT: "1"
          OBSERVABILITY_SILENT: "1"
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          LLM_TELEMETRY_SILENT: "1"
          OBSERVABILITY_SILENT: "1"
