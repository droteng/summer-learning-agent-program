<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="A parent and two children learning together at a sunny table with a glowing tablet">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="55%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="0.18" cy="0.22" r="0.4">
      <stop offset="0%" stop-color="#fff7ed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tablet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e9aa7"/>
    </linearGradient>
    <linearGradient id="bookshelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Warm sky background -->
  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#sunglow)"/>

  <!-- Window frame (right side, subtle) -->
  <g opacity="0.45">
    <rect x="900" y="60" width="320" height="380" rx="8" fill="#fff" opacity="0.5"/>
    <rect x="900" y="60" width="320" height="380" rx="8" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <line x1="1060" y1="60" x2="1060" y2="440" stroke="#fbbf24" stroke-width="3"/>
    <line x1="900" y1="250" x2="1220" y2="250" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- Bookshelf silhouette -->
  <g opacity="0.7">
    <rect x="60" y="100" width="160" height="240" rx="6" fill="url(#bookshelf)"/>
    <rect x="80" y="130" width="22" height="80" rx="2" fill="#ec4899"/>
    <rect x="106" y="120" width="20" height="90" rx="2" fill="#7c3aed"/>
    <rect x="130" y="135" width="24" height="75" rx="2" fill="#0e9aa7"/>
    <rect x="158" y="125" width="22" height="85" rx="2" fill="#16a34a"/>
    <rect x="184" y="140" width="20" height="70" rx="2" fill="#f59e0b"/>
    <rect x="80" y="230" width="120" height="14" rx="2" fill="#fef3c7"/>
  </g>

  <!-- Table surface -->
  <ellipse cx="540" cy="600" rx="540" ry="62" fill="url(#table)"/>
  <ellipse cx="540" cy="595" rx="540" ry="46" fill="#fbbf24"/>

  <!-- Floor shadow -->
  <ellipse cx="540" cy="655" rx="500" ry="20" fill="#000" opacity="0.08"/>

  <!-- Tablet glow on the table -->
  <g transform="translate(360 470)">
    <rect x="0" y="0" width="320" height="220" rx="20" fill="url(#tablet)"/>
    <rect x="14" y="14" width="292" height="192" rx="12" fill="#0c4a6e"/>
    <!-- chart bars -->
    <rect x="40" y="160" width="22" height="32" rx="3" fill="#34d399"/>
    <rect x="70" y="140" width="22" height="52" rx="3" fill="#34d399"/>
    <rect x="100" y="115" width="22" height="77" rx="3" fill="#22d3ee"/>
    <rect x="130" y="95" width="22" height="97" rx="3" fill="#fbbf24"/>
    <!-- star -->
    <path d="M 230 80 l 11 22 l 24 4 l -18 17 l 5 24 l -22 -12 l -22 12 l 5 -24 l -18 -17 l 24 -4 z" fill="#fde68a"/>
    <!-- formula text suggestion -->
    <rect x="40" y="40" width="170" height="10" rx="3" fill="#fde68a" opacity="0.85"/>
    <rect x="40" y="58" width="120" height="10" rx="3" fill="#22d3ee" opacity="0.85"/>
  </g>
  <!-- Tablet shine -->
  <rect x="376" y="486" width="80" height="14" rx="6" fill="#fff" opacity="0.35"/>

  <!-- Apple on table -->
  <g transform="translate(770 530)">
    <ellipse cx="0" cy="20" rx="34" ry="32" fill="#ef4444"/>
    <ellipse cx="-10" cy="10" rx="12" ry="6" fill="#fca5a5"/>
    <path d="M 0 -10 q 6 -14 18 -12" fill="none" stroke="#65a30d" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="18" cy="-12" rx="10" ry="5" fill="#65a30d"/>
  </g>

  <!-- Glass of water -->
  <g transform="translate(220 540)">
    <path d="M 0 0 h 50 l -6 60 h -38 z" fill="#bae6fd" opacity="0.7"/>
    <path d="M 0 0 h 50 l -6 60 h -38 z" fill="none" stroke="#0891b2" stroke-width="2.5"/>
    <ellipse cx="25" cy="0" rx="25" ry="6" fill="#7dd3fc" opacity="0.85"/>
  </g>

  <!-- Notebook with star sticker -->
  <g transform="translate(80 540) rotate(-6)">
    <rect x="0" y="0" width="110" height="56" rx="4" fill="#fff" stroke="#fbbf24" stroke-width="3"/>
    <line x1="10" y1="20" x2="80" y2="20" stroke="#fde68a" stroke-width="3"/>
    <line x1="10" y1="34" x2="78" y2="34" stroke="#fde68a" stroke-width="3"/>
    <path d="M 92 12 l 4 8 l 9 1 l -6 6 l 2 9 l -8 -4 l -8 4 l 2 -9 l -6 -6 l 9 -1 z" fill="#facc15" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- THREE FIGURES (warm friendly silhouettes) -->
  <!-- Parent (left, taller) -->
  <g transform="translate(250 280)">
    <!-- body -->
    <path d="M -50 200 q 0 -90 50 -90 q 50 0 50 90 z" fill="#0e9aa7"/>
    <!-- neck -->
    <rect x="-12" y="100" width="24" height="20" fill="#d97706"/>
    <!-- head -->
    <circle cx="0" cy="80" r="42" fill="#d97706"/>
    <!-- hair bun -->
    <circle cx="0" cy="42" r="14" fill="#451a03"/>
    <circle cx="0" cy="80" r="42" fill="none" stroke="#451a03" stroke-width="2" opacity="0.2"/>
    <!-- friendly smile (no facial features per kid-safe guidance — just a soft curve) -->
    <path d="M -10 92 q 10 8 20 0" fill="none" stroke="#451a03" stroke-width="3" stroke-linecap="round"/>
    <!-- pointing arm toward the tablet -->
    <path d="M 30 130 q 60 30 100 100" fill="none" stroke="#0e9aa7" stroke-width="22" stroke-linecap="round"/>
    <circle cx="130" cy="230" r="14" fill="#d97706"/>
  </g>

  <!-- Child 1 (middle, laughing) -->
  <g transform="translate(490 320)">
    <!-- body -->
    <path d="M -42 170 q 0 -76 42 -76 q 42 0 42 76 z" fill="#ec4899"/>
    <!-- neck -->
    <rect x="-10" y="78" width="20" height="16" fill="#a16207"/>
    <!-- head -->
    <circle cx="0" cy="60" r="36" fill="#a16207"/>
    <!-- hair (curly) -->
    <circle cx="-22" cy="34" r="14" fill="#1f2937"/>
    <circle cx="0" cy="22" r="16" fill="#1f2937"/>
    <circle cx="22" cy="34" r="14" fill="#1f2937"/>
    <!-- big smile (laughing) -->
    <path d="M -14 72 q 14 14 28 0" fill="#1f2937"/>
    <!-- arm raised in laughter -->
    <path d="M 36 120 q 30 -10 40 -50" fill="none" stroke="#ec4899" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Child 2 (right, thinking) -->
  <g transform="translate(700 330)">
    <!-- body -->
    <path d="M -42 160 q 0 -72 42 -72 q 42 0 42 72 z" fill="#7c3aed"/>
    <!-- neck -->
    <rect x="-10" y="72" width="20" height="16" fill="#e5b482"/>
    <!-- head -->
    <circle cx="0" cy="56" r="34" fill="#e5b482"/>
    <!-- short hair -->
    <path d="M -32 48 q 0 -38 32 -38 q 32 0 32 38 q -16 -10 -32 -10 q -16 0 -32 10 z" fill="#0c4a6e"/>
    <!-- thinking expression: hand to chin -->
    <path d="M -30 100 q -10 -10 -6 -34" fill="none" stroke="#7c3aed" stroke-width="16" stroke-linecap="round"/>
    <circle cx="-28" cy="68" r="10" fill="#e5b482"/>
    <!-- small smile -->
    <path d="M -6 68 q 6 4 12 0" fill="none" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>
    <!-- pencil in other hand -->
    <g transform="translate(40 130) rotate(35)">
      <rect x="-3" y="-30" width="6" height="40" fill="#fcd34d" stroke="#92400e" stroke-width="1"/>
      <polygon points="-3,-30 3,-30 0,-38" fill="#1f2937"/>
    </g>
  </g>

  <!-- Soft floating sparkles for magic-of-learning vibe -->
  <g fill="#fcd34d">
    <circle cx="900" cy="180" r="5"/>
    <circle cx="960" cy="240" r="3"/>
    <circle cx="870" cy="280" r="4"/>
    <circle cx="1020" cy="320" r="6"/>
    <circle cx="160" cy="380" r="4"/>
    <circle cx="100" cy="440" r="3"/>
  </g>
</svg>
