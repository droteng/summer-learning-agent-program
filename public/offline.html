<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dr. Spark Academy offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #17202a;
        background: #f5f7fa;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        max-width: 560px;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 24px;
        background: white;
      }

      h1 {
        margin: 0 0 12px;
      }

        margin: 0;
        color: #5a6573;
      }

  <body>
    <main>
      <h1>Dr. Spark Academy is offline</h1>
      <p>Reconnect to load new missions, rewards, and sharing updates. Saved local progress will still be available when the app reconnects.</p>
